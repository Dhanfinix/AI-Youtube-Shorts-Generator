name: YtClipper Automated Pipeline

on:
  schedule:
    # Run every 30 minutes to check Google Sheet
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allow manual execution via GitHub UI

jobs:
  process-clips:
    runs-on: ubuntu-latest
    env:
      ENABLE_TOR_ROUTING: ${{ secrets.ENABLE_TOR_ROUTING || 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Start PO Token Provider (Background)
        run: |
          echo "[setup] Starting official PO Token Provider Docker container..."
          docker run --name bgutil-provider -d -p 4416:4416 --restart always brainicism/bgutil-ytdlp-pot-provider
          docker ps
          echo "Polling BGUtil Provider Readiness..."
          for i in {1..30}; do
            if curl -s --fail http://127.0.0.1:4416/ping > /dev/null; then
              echo "✅ Provider is ONLINE and healthy!"
              exit 0
            fi
            echo "Still initializing... ($i/30)"
            sleep 2
          done
          echo "❌ CRITICAL: Provider failed to become healthy within 60 seconds!"
          docker logs bgutil-provider
          exit 1

      - name: Install and Start Tor Service
        if: ${{ env.ENABLE_TOR_ROUTING == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          sudo service tor start
          echo "Verifying Tor Tunnel Status..."
          sleep 5
          curl -s --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip || echo "Tor verification failed, proceed anyway..."

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-local.txt
          pip install -U "yt-dlp>=2025.01.01" pytubefix pysocks

      - name: Verify yt-dlp setup and plugin activation
        run: |
          python -c "import yt_dlp; print(f'yt-dlp version: {yt_dlp.version.__version__}')"
          echo "--- Confirming Repository Sidecar Plugin Layout ---"
          ls -R yt_dlp_plugins || echo "WARNING: Plugin directory MISSING!"
          echo "--- Verbose Loading Verification ---"
          # Use python -m to ensure it executes the EXACT SAME interpreter configuration as automation.py
          python -m yt_dlp -v --skip-download "https://www.youtube.com/watch?v=dQw4w9WgXcQ" 2>&1 | head -n 50
          # Ensure we actually found the plugin
          python -m yt_dlp -v --skip-download "https://www.youtube.com/watch?v=dQw4w9WgXcQ" 2>&1 | grep -qi "bgutil:http" || (echo "CRITICAL: BGUtil HTTP PO provider NOT detected by yt-dlp!" && exit 1)
          echo "✅ Verification PASSED: BGUtil HTTP Provider detected."

      - name: Run Cookie Validator Tests
        run: |
          python tests/test_cookie_validator.py

      - name: Run Automation Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME || 'YtClipper_Jobs' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOCAL_TRANSCRIBER_PRIORITY: ${{ secrets.LOCAL_TRANSCRIBER_PRIORITY || 'youtube' }}
          LOCAL_TARGET_LANGUAGE: ${{ secrets.LOCAL_TARGET_LANGUAGE || 'auto' }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          ENABLE_TOR_ROUTING: ${{ secrets.ENABLE_TOR_ROUTING || 'true' }}
          YOUTUBE_PROXY: ${{ secrets.YOUTUBE_PROXY }}
          YT_DLP_PLAYER_CLIENTS: ${{ secrets.YT_DLP_PLAYER_CLIENTS || 'web_creator,default' }}
          RAPID_YT_API_KEY: ${{ secrets.RAPID_YT_API_KEY }}
        run: |
          python automation.py

